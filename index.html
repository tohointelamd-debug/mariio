<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Super Gemini - World 1 (Enter to Jump)</title>
</head>
<body style="margin:0;overflow:hidden;background:#000;touch-action:none;">
<canvas id="c"></canvas>

<script>
var c = document.getElementById("c");
c.width = 400; c.height = 200;
var g = c.getContext("2d");

var stages = [
    {n:"1-1", H:[[350,60]],B:[[340,140,40,20,0]],E:[[250,150,0.8,1,0,100,600,0]],goal:700},
    {n:"1-2", H:[[200,50],[500,50]],B:[[180,140,20,20,0]],E:[[300,150,0.8,1,0,250,450,0]],goal:900},
    {n:"1-3", H:[[200,150],[500,150]],B:[[220,140,50,10,0],[380,110,60,10,0],[550,140,50,10,0],[380,150,20,10,10]],E:[[400,90,0.8,1,0,380,440,0]],goal:1000},
    {n:"1-4", H:[[250,1100]], B:[[250,140,20,20,0],[350,140,20,20,10],[450,120,80,10,0],[650,60,20,100,0],[750,85,50,10,0],[850,130,20,20,10],[970,110,20,20,10],[1080,100,20,20,10],[1200,110,150,10,0]],M:[[550,110,0],[680,105,1]],E:[[900,100,0,1,0,0,0,1]],goal:1300},
    {n:"1-5", H:[[150,1000]],B:[[50,150,100,10,0],[600,130,40,10,0],[1100,150,100,10,0]],M:[[250,130,1,60,0],[450,100,1,80,Math.PI],[750,130,1,70,0],[950,100,1,80,Math.PI]],E:[[350,100,0,1,0,0,0,1,100,0.05,0],[530,80,0,1,0,0,0,1,80,0.06,0],[850,100,0,1,0,0,0,1,100,0.04,0],[1050,80,0,1,0,0,0,1,80,0.05,0]],goal:1150},
    {n:"1-6", H:[[100,1100]],B:[[50,150,100,10,0],[250,140,30,15,10],[420,120,30,15,10],[590,100,30,15,10],[760,120,30,15,10],[930,140,30,15,10],[1050,150,150,10,0]],E:[[680,50,0,1,0,0,0,1,60,0.05,0]],goal:1150},
    {n:"1-7", H:[[150,850]], B:[[50,150,100,10,0],[250,140,20,20,10],[350,110,20,20,10],[450,80,20,20,10],[550,50,20,20,10],[650,120,300,10,0],[1000,150,500,10,0]],E:[[1200,140,0.8,1,0,1150,1400,0]],goal:1450},
    {n:"1-8", H:[[200,1600]],B:[[100,150,50,10,0],[180,145,30,15,10],[300,120,20,80,0],[450,140,100,10,0],[600,120,30,15,10],[720,110,30,15,10],[840,100,30,15,10],[960,110,30,15,10],[1100,145,500,10,0]],M:[[360,100,1,40,0]],E:[[1300,130,1.2,1,0,1200,1500,0]],goal:1500}
];

var stageIdx = 0, x, y, px, py, vx, vy, s, onGround, t, boost, dead, cleared;
var d, E, H, B, M, goal, PW = 10, PH = 10;
var k = {}, isDash = false, lastKey = 0, lastTapTime = 0;

function init(){
    x=50; y=150; px=50; py=150; vx=0; vy=0; s=0; onGround=0;
    t=0; boost=0; dead=0; cleared=0; isDash = false;
    d = stages[stageIdx];
    E = JSON.parse(JSON.stringify(d.E || []));
    H = (d.H || []).slice().sort(function(a, b) { return a[0] - b[0]; });
    B = (d.B || []).slice();
    M = [];
    if(d.M){
        for(var i=0; i<d.M.length; i++){
            var mData = d.M[i];
            M.push({ ox: mData[0], oy: mData[1], type: mData[2], range: mData[3] || 50, phase: mData[4] || 0, px: mData[0], py: mData[1] });
        }
    }
    goal = d.goal;
}
init();

c.onclick = function() { if(dead) init(); };

window.onkeydown = function(e) {
    if(e.keyCode >= 49 && e.keyCode <= 56) { stageIdx = e.keyCode - 49; init(); return; }
    // Enter(13)でもリスタート可能に
    if(e.keyCode === 13 && dead) { init(); return; }
    
    var now = new Date().getTime();
    if(e.keyCode === 37 || e.keyCode === 39) {
        if(lastKey === e.keyCode && (now - lastTapTime) < 300) isDash = true;
        lastTapTime = now; lastKey = e.keyCode;
    }
    k[e.keyCode] = 1;
};
window.onkeyup = function(e) { k[e.keyCode] = 0; if(!k[37] && !k[39]) isDash = false; };

setInterval(function(){
    t++;
    g.fillStyle = "#6cf"; g.fillRect(0, 0, 400, 200);
    
    if(dead){
        g.fillStyle = "#000"; g.textAlign = "center";
        g.fillText("GAME OVER", 200, 80);
        g.fillText("CLICK or ENTER TO RETRY", 200, 110);
        g.textAlign = "left"; return;
    }

    var maxSpeed = isDash ? 3.6 : 2.4;
    var accel = onGround ? 0.4 : 0.15;
    if(k[37]) vx -= accel; else if(k[39]) vx += accel; else vx *= onGround ? 0.7 : 0.96;
    if(vx > maxSpeed) vx = maxSpeed; if(vx < -maxSpeed) vx = -maxSpeed;
    
    // ★Enter(13)キーまたは上矢印(38)でジャンプ
    if((k[38] || k[13]) && onGround) { vy = boost ? -8.8 : -6.4; onGround = 0; }
    
    vy += 0.38; if(vy > 9) vy = 9;
    px = x; py = y; x += vx; y += vy;
    onGround = 0; boost = 0; s = Math.max(0, x - 100);
    
    var isInsideHole = false;
    g.fillStyle = "#070";
    var start = 0;
    for(var i=0; i<H.length; i++){
        var h = H[i];
        if(h[0] > start) g.fillRect(start - s, 160, h[0] - start, 40);
        if(x + PW > h[0] && x < h[0] + h[1]) isInsideHole = true;
        start = h[0] + h[1];
    }
    g.fillRect(start - s, 160, 2000, 40);
    if(y > 150){
        if(isInsideHole) { if(y > 210) dead = 1; }
        else { y = 150; vy = 0; onGround = 1; }
    }

    for(var i=0; i<B.length; i++){
        var b = B[i], bx=b[0], by=b[1], bw=b[2], bh=b[3], btype=b[4];
        if(btype==20){ g.fillStyle="#f00"; g.fillRect(bx-s,by,bw,bh); }
        else { g.fillStyle = (btype == 10) ? "#f90" : "#964B00"; g.fillRect(bx - s, by, bw, bh); }
        if (x < bx + bw && x + PW > bx && y < by + bh && y + PH > by) {
            if(btype == 20) { dead = 1; continue; }
            var fT = py + PH <= by, fB = py >= by + bh, fL = px + PW <= bx, fR = px >= bx + bw;
            if (fT) { y = by - PH; vy = 0; onGround = 1; if(btype == 10) boost = 1; }
            else if (fB) { y = by + bh; vy = 0; }
            else if (fL) { x = bx - PW; vx = 0; }
            else if (fR) { x = bx + bw; vx = 0; }
        }
    }

    g.fillStyle = "#888";
    for(var i=0; i<M.length; i++){
        var m = M[i];
        var mx = m.type === 1 ? m.ox + Math.sin(t / 40 + m.phase) * m.range : m.ox;
        var my = m.type === 1 ? m.oy : m.oy + Math.sin(t / 30 + m.phase) * m.range;
        var dx = mx - m.px; g.fillRect(mx - s, my, 50, 8);
        if(px + PW > mx && px < mx + 50 && py + PH <= m.py + 2 && y + PH >= my){ y = my - PH; vy = 0; onGround = 1; x += dx; }
        m.px = mx; m.py = my;
    }

    for(var i=0; i<E.length; i++){
        var e = E[i]; if(!e[3]) continue;
        if(e[7] === 1){
            e[1] = e[8] + Math.sin(t * e[9] + e[10]) * 40; 
            g.fillStyle = "#f0f"; 
        } else {
            var nX = e[0] + e[2], hole = false;
            for(var j=0; j<H.length; j++) if(nX > H[j][0]-5 && nX < H[j][0]+H[j][1]) hole = true;
            if(nX < e[5] || nX > e[6] || (hole && e[1]>=150)) e[2] *= -1;
            e[0] += e[2]; g.fillStyle = "#f00";
        }
        g.fillRect(e[0] - s, e[1], 10, 10);
        if(x < e[0] + 10 && x + PW > e[0] && y < e[1] + 10 && y + PH > e[1]){
            if(vy > 0 && py + PH <= e[1] && e[7]===0){ vy = -5; e[3] = 0; } else { dead = 1; }
        }
    }

    g.fillStyle = isDash ? "#ff0" : "#fff"; g.fillRect(x - s, y, PW, PH);
    g.fillStyle = "#fff"; g.fillRect(goal - s, 120, 10, 40);
    if(x > goal && !cleared){
        cleared = 1; stageIdx++;
        if(stageIdx >= stages.length){ alert("World 1 Clear!"); stageIdx = 0; }
        init();
    }
    g.fillStyle = "#000"; 
    g.fillText("STAGE: " + d.n + " (Jump: Up or Enter)", 10, 15);
}, 25);
</script>
</body>
</html>
